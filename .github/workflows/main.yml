name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name asynk --hidden-import scipy.signal --hidden-import scipy.fft --hidden-import scipy.fft._pocketfft --hidden-import numpy --hidden-import soundfile --hidden-import lxml --hidden-import lxml.etree --hidden-import PySide6.QtWidgets --hidden-import PySide6.QtCore --hidden-import PySide6.QtGui --exclude-module matplotlib --exclude-module tkinter --exclude-module PIL --noconfirm --clean main.py

      - name: Verify build
        run: |
          if (Test-Path "dist/asynk.exe") { Write-Host "Build successful" } else { exit 1 }
        shell: pwsh

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: asynk-windows
          path: dist/asynk.exe
          retention-days: 90
